<style>
  :root{
    --bg:#15171a; --panel:#1c1f24; --panel2:#22262c; --line:#2c3037;
    --amber:#2f95ef; --amber-dim:#1c3a54; --text:#e9ebee; --sub:#8d939c;
    --good:#4caf7d;
    --mono:'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;
    --sans:-apple-system,'Inter','Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; background:var(--bg); color:var(--text); font-family:var(--sans); height:100%; overscroll-behavior:none;}
  body{display:flex; flex-direction:column; height:100vh;}

  header{padding:14px 16px 10px; border-bottom:1px solid var(--line); flex-shrink:0;
    padding-top:max(14px, env(safe-area-inset-top));}
  .brand{display:flex; align-items:baseline; gap:8px; margin-bottom:12px;}
  .backbtn{width:48px; height:48px; display:flex; align-items:center; justify-content:center; background:var(--panel2); border:1px solid var(--line); border-radius:10px; color:var(--text); font-size:28px; line-height:1; padding:0; margin:0 2px 0 0; cursor:pointer; flex-shrink:0; -webkit-tap-highlight-color:transparent;}
  .backbtn:active{background:var(--line);}
  .logo{width:96px; height:96px; border-radius:16px; flex-shrink:0; margin-left:auto;}
  .brand h1{font-size:16px; margin:0; font-weight:650; letter-spacing:-.01em;}

  .crumbs{display:flex; align-items:center; gap:6px; margin-bottom:10px; min-height:20px;}
  .crumb{font-size:12.5px; color:var(--sub); font-family:var(--mono); cursor:pointer;}
  .crumb.current{color:var(--text); cursor:default;}
  .crumb-sep{color:var(--line); font-size:12px;}

  .searchwrap{position:relative;}
  #search{width:100%; background:var(--panel); border:1px solid var(--line); color:var(--text);
    padding:11px 14px 11px 36px; border-radius:10px; font-size:15px; font-family:var(--sans);}
  #search:focus{outline:none; border-color:var(--amber-dim);}
  .searchwrap svg{position:absolute; left:11px; top:50%; transform:translateY(-50%); opacity:.5;}

  #stats{padding:8px 16px; font-size:11.5px; color:var(--sub); font-family:var(--mono); flex-shrink:0;}
  main{flex:1; overflow-y:auto; padding-bottom:20px;}

  .tile{display:flex; align-items:center; gap:12px; padding:15px 16px; border-bottom:1px solid var(--line); cursor:pointer;}
  .tile:active{background:var(--panel2);}
  .tile-logo-wrap{width:34px; height:34px; border-radius:8px; background:#fff; display:flex; align-items:center;
    justify-content:center; flex-shrink:0; overflow:hidden; padding:5px;}
  .tile-logo-wrap img{width:100%; height:100%; object-fit:contain;}
  .tile-icon{width:34px; height:34px; border-radius:8px; background:var(--panel2); display:flex; align-items:center;
    justify-content:center; flex-shrink:0; color:var(--amber); font-family:var(--mono); font-size:12px; font-weight:700;}
  .tile-mid{flex:1; min-width:0;}
  .tile-title{font-size:15px; font-weight:600;}
  .tile-sub{font-size:12px; color:var(--sub); margin-top:2px; font-family:var(--mono);}
  .chev{color:var(--sub); flex-shrink:0;}

  .row{display:flex; align-items:center; gap:10px; padding:13px 16px; border-bottom:1px solid var(--line); cursor:pointer;}
  .row:active{background:var(--panel2);}
  .partchip{font-family:var(--mono); font-size:11.5px; color:#ffffff; background:var(--amber);
    padding:4px 7px; border-radius:4px; font-weight:700; flex-shrink:0; white-space:nowrap;}
  .partchip.empty{background:var(--panel2); color:var(--sub); font-weight:500;}
  .rowmid{flex:1; min-width:0;}
  .rowdesc{font-size:13.5px; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .rowmeta{font-size:11px; color:var(--sub); margin-top:2px; font-family:var(--mono);}
  .pdfbtn{flex-shrink:0; width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center;
    background:rgba(76,175,125,.15); color:var(--good);}
  .pdfbtn.off{background:var(--panel2); color:var(--sub); opacity:.5;}

  .empty-state{padding:60px 24px; text-align:center; color:var(--sub); font-size:13.5px; line-height:1.6;}
</style>
</head>

let nav = {level:'clients'};
history.replaceState(nav, '');

function openPdf(url){ window.open(url, '_blank', 'noopener'); }

function pushNav(newNav){ nav = newNav; history.pushState(nav, ''); render(); }
function goClients(){ pushNav({level:'clients'}); }
function goProjects(client){ pushNav({level:'projects', client}); }
function goParts(client, project){ pushNav({level:'parts', client, project}); }
function goBack(){ history.back(); }

window.addEventListener('popstate', (e)=>{
  nav = e.state || {level:'clients'};
  render();
});

function renderCrumbs(){
  const c = document.getElementById('crumbs');
  let html = `<span class="crumb ${nav.level==='clients'?'current':''}" onclick="goClients()">All clients</span>`;
  if(nav.client){
    html += `<span class="crumb-sep">/</span><span class="crumb ${nav.level==='projects'?'current':''}" onclick="goProjects('${esc(nav.client)}')">${nav.client}</span>`;
  }
  if(nav.project){
    html += `<span class="crumb-sep">/</span><span class="crumb current">${nav.project}</span>`;
  }
  c.innerHTML = html;
}

function esc(s){ return (s||'').replace(/'/g,"\\'"); }

function matchesSearch(row,q){
  if(!q) return true;
  q = q.toLowerCase();
  return (row.part+row.desc+row.project+row.client).toLowerCase().includes(q);
}

function render(){
  renderCrumbs();
  document.getElementById('backBtn').style.display = (nav.level === 'clients') ? 'none' : '';
  const q = document.getElementById('search').value.trim();
  const list = document.getElementById('list');
  const stats = document.getElementById('stats');

  // global search overrides drill-down navigation
  if(q){
    const rows = DATA.filter(r => matchesSearch(r,q));
    stats.textContent = `${rows.length} result${rows.length!==1?'s':''}`;
    list.innerHTML = rows.length ? rows.map(renderPartRow).join('') :
      `<div class="empty-state">No drawings match "${q}".</div>`;
    attachPartHandlers();
    return;
  }

  if(nav.level === 'clients'){
    const clients = Array.from(new Set(DATA.map(d=>d.client))).sort();
    stats.textContent = `${clients.length} clients · ${DATA.length} drawings`;
    list.innerHTML = clients.map(c=>{
      const count = DATA.filter(d=>d.client===c).length;
      const logo = CLIENT_LOGOS[c];
      const iconHtml = logo
        ? `<div class="tile-logo-wrap"><img src="${logo}" alt="${c}" onerror="this.parentElement.outerHTML='<div class=&quot;tile-icon&quot;>${c.slice(0,2).toUpperCase()}</div>'"></div>`
        : `<div class="tile-icon">${c.slice(0,2).toUpperCase()}</div>`;
      return `<div class="tile" data-client="${c}">
        ${iconHtml}
        <div class="tile-mid"><div class="tile-title">${c}</div><div class="tile-sub">${count} drawing${count!==1?'s':''}</div></div>
        <div class="chev">›</div>
      </div>`;
    }).join('');
    list.querySelectorAll('.tile').forEach(el=>{
      el.addEventListener('click', ()=> goProjects(el.dataset.client));
    });
  }

  else if(nav.level === 'projects'){
    const rows = DATA.filter(d=>d.client===nav.client);
    const projects = Array.from(new Set(rows.map(d=>d.project).filter(Boolean))).sort();
    stats.textContent = `${projects.length} projects`;
    if(projects.length === 0){
      list.innerHTML = `<div class="empty-state">No projects indexed yet for ${nav.client}.</div>`;
      return;
    }
    list.innerHTML = projects.map(p=>{
      const count = rows.filter(d=>d.project===p).length;
      return `<div class="tile" data-project="${p}">
        <div class="tile-icon">${(p.match(/[A-Z]+/)||['-'])[0].slice(0,2)}</div>
        <div class="tile-mid"><div class="tile-title">${p}</div><div class="tile-sub">${count} drawing${count!==1?'s':''}</div></div>
        <div class="chev">›</div>
      </div>`;
    }).join('');
    list.querySelectorAll('.tile').forEach(el=>{
      el.addEventListener('click', ()=> goParts(nav.client, el.dataset.project));
    });
  }

  else if(nav.level === 'parts'){
    const rows = DATA.filter(d=>d.client===nav.client && d.project===nav.project);
    stats.textContent = `${rows.length} drawing${rows.length!==1?'s':''}`;
    list.innerHTML = rows.map(renderPartRow).join('');
    attachPartHandlers();
  }
}

function renderPartRow(r){
  const idx = DATA.indexOf(r);
  const hasPdf = !!r.pdf;
  return `<div class="row" data-idx="${idx}">
    <div class="partchip ${r.part?'':'empty'}">${r.part || '—'}</div>
    <div class="rowmid">
      <div class="rowdesc">${r.desc || 'Not yet indexed'}</div>
      <div class="rowmeta">${r.client}${r.project? ' · '+r.project:''}${r.rev? ' · Rev '+r.rev:''}</div>
    </div>
    <div class="pdfbtn ${hasPdf?'':'off'}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/>
      </svg>
    </div>
  </div>`;
}

function attachPartHandlers(){
  document.querySelectorAll('.row').forEach(el=>{
    el.addEventListener('click', ()=>{
      const r = DATA[+el.dataset.idx];
      if(r.pdf) openPdf(r.pdf);
    });
  });
}

document.getElementById('search').addEventListener('input', render);
render();
</script>
</body>
</html>
